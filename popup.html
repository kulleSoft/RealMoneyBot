<!DOCTYPE html>
<html lang="pt-BR" style="color-scheme:light only">
<head>
<meta charset="UTF-8">
<title>RealMoney Bot</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{color-scheme:light only}
@media(prefers-color-scheme:dark){html,body{background:#f8fafc!important;color:#0f172a!important}}

body{
  width:370px;
  background:#f8fafc;
  color:#0f172a;
  font-family:'Inter',system-ui,sans-serif;
  font-size:12px;
  overflow:hidden;
}

/* ── HEADER ── */
.header{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;
  background:#fff;
  border-bottom:1px solid #e2e8f0;
  box-shadow:0 1px 3px rgba(0,0,0,.06);
}
.logo{
  width:34px;height:34px;border-radius:10px;
  background:linear-gradient(135deg,#C89500,#F5C400);
  display:flex;align-items:center;justify-content:center;
  font-size:17px;flex-shrink:0;
  box-shadow:0 2px 6px rgba(200,149,0,.3);
}
.header-info h1{font-size:13px;font-weight:700;color:#0f172a;letter-spacing:-.2px}
.header-info p{font-size:9px;color:#94a3b8;margin-top:1px}
.header-right{margin-left:auto;display:flex;align-items:center;gap:6px}
.status-pill{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:600;color:#64748b;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:999px;padding:3px 9px}
.status-dot{width:6px;height:6px;border-radius:50%;background:#94a3b8;flex-shrink:0}
.status-dot.running{background:#10b981;box-shadow:0 0 0 2px rgba(16,185,129,.2);animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.timer{font-family:'JetBrains Mono',monospace;font-size:10px;color:#94a3b8;letter-spacing:.4px}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);background:#e2e8f0;gap:1px;border-bottom:1px solid #e2e8f0}
.stat{background:#fff;padding:8px 6px;text-align:center;position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat:nth-child(1)::before{background:#C89500}
.stat:nth-child(2)::before{background:#10b981}
.stat:nth-child(3)::before{background:#f59e0b}
.stat:nth-child(4)::before{background:#ef4444}
.stat-val{font-size:20px;font-weight:700;line-height:1;letter-spacing:-1px}
.stat-label{font-size:8px;color:#94a3b8;margin-top:2px;text-transform:uppercase;letter-spacing:.5px;font-weight:700}

/* ── PROGRESS ── */
.progress-bar{height:3px;background:#f1f5f9}
.progress-fill{height:100%;background:linear-gradient(90deg,#C89500,#F5C400);transition:width .5s ease;width:0%}

/* ── ACTION BUTTONS (Dashboard + Config) ── */
.action-bar{
  display:flex;gap:8px;padding:10px 14px;
  background:#fff;border-bottom:1px solid #e2e8f0;
}
.btn-action{
  flex:1;height:34px;border-radius:9px;border:1px solid;
  font-family:'Inter',sans-serif;font-size:11px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;
  transition:all .15s;letter-spacing:.1px;
}
/* Dashboard — azul destaque */
.btn-action-dash{
  background:#eff6ff;border-color:#93c5fd;color:#1d4ed8;
}
.btn-action-dash:hover{background:#dbeafe;border-color:#60a5fa}

/* Config — amarelo/dourado destaque */
.btn-action-cfg{
  background:#FFF8E0;border-color:#EDD47A;color:#A07800;
}
.btn-action-cfg:hover{background:#FFF3C0;border-color:#C89500}

/* Captcha — verde */
.btn-action-captcha{
  background:#ecfdf5;border-color:#86efac;color:#166534;
}
.btn-action-captcha:hover{background:#dcfce7;border-color:#4ade80}

/* ── EMAIL ── */
.email-section{padding:9px 14px;background:#fff;border-bottom:1px solid #e2e8f0}
.email-label{font-size:9px;color:#94a3b8;text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px;font-weight:700}
.email-input{
  width:100%;background:#f8fafc;border:1px solid #e2e8f0;border-radius:7px;
  padding:7px 10px;color:#0f172a;font-family:'JetBrains Mono',monospace;
  font-size:11px;outline:none;transition:border .2s,box-shadow .2s;
}
.email-input:focus{border-color:#C89500;box-shadow:0 0 0 3px rgba(200,149,0,.1)}

/* ── MODO NAVEGAÇÃO ── */
.nav-mode-bar{
  display:flex;align-items:center;gap:8px;
  padding:8px 14px;background:#f8fafc;border-bottom:1px solid #e2e8f0;
}
.nav-mode-label{font-size:10px;font-weight:600;color:#64748b;white-space:nowrap}
.toggle-group{display:flex;border:1px solid #e2e8f0;border-radius:7px;overflow:hidden;background:#fff}
.toggle-opt{
  flex:1;height:26px;border:none;background:transparent;
  font-family:'Inter',sans-serif;font-size:10px;font-weight:600;
  color:#94a3b8;cursor:pointer;padding:0 10px;white-space:nowrap;
  transition:all .15s;border-right:1px solid #e2e8f0;
}
.toggle-opt:last-child{border-right:none}
.toggle-opt.active{background:#0f172a;color:#fff}
.toggle-opt:hover:not(.active){background:#f1f5f9;color:#475569}

/* ── CONTROLES ── */
.controls{display:flex;gap:6px;padding:9px 14px;background:#fff;border-bottom:1px solid #e2e8f0}
.btn{
  flex:1;height:32px;border:1px solid;border-radius:7px;
  font-family:'Inter',sans-serif;font-size:11px;font-weight:700;
  cursor:pointer;transition:all .15s;
}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-start{background:#f0fdf4;border-color:#86efac;color:#16a34a}
.btn-start:hover:not(:disabled){background:#dcfce7}
.btn-stop{background:#fef2f2;border-color:#fca5a5;color:#dc2626}
.btn-stop:hover:not(:disabled){background:#fee2e2}

/* ── TABELA ── */
.table-wrap{max-height:175px;overflow-y:auto;border-bottom:1px solid #e2e8f0;background:#fff}
.table-wrap::-webkit-scrollbar{width:4px}
.table-wrap::-webkit-scrollbar-track{background:#f8fafc}
.table-wrap::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:2px}
table{width:100%;border-collapse:collapse}
thead th{
  position:sticky;top:0;background:#f8fafc;color:#94a3b8;
  font-size:9px;text-transform:uppercase;letter-spacing:.6px;
  padding:5px 8px;text-align:left;font-weight:700;
  border-bottom:1px solid #e2e8f0;z-index:1;
}
tbody tr{border-bottom:1px solid #f1f5f9;transition:background .1s}
tbody tr:hover{background:#f8fafc}
tbody td{padding:5px 8px;font-size:11px}
.coin-badge{font-weight:700;font-size:11px;color:#0f172a;font-family:'JetBrains Mono',monospace}
.site-chip{display:inline-block;font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;letter-spacing:.3px;text-transform:uppercase}
.site-chip.cfc{background:#eef2ff;color:#4338ca;border:1px solid #c7d2fe}
.site-chip.bee{background:#fff7ed;color:#c2410c;border:1px solid #fed7aa}
.s-pending{color:#94a3b8}.s-running{color:#d97706}.s-ok{color:#16a34a}.s-error{color:#dc2626}.s-skip{color:#2563eb}

/* ── LOG ── */
.log-header{
  font-size:9px;color:#94a3b8;text-transform:uppercase;letter-spacing:.6px;
  padding:6px 14px 4px;font-weight:700;background:#fff;border-bottom:1px solid #e2e8f0;
}
.log-box{
  height:82px;overflow-y:auto;padding:4px 14px 6px;
  font-family:'JetBrains Mono',monospace;font-size:10px;line-height:1.6;
  background:#f8fafc;
}
.log-box::-webkit-scrollbar{width:3px}
.log-box::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:2px}
.log-entry{display:flex;gap:5px}
.log-ts{color:#e2e8f0;flex-shrink:0}
.log-msg.ok{color:#16a34a}.log-msg.error{color:#dc2626}
.log-msg.warn{color:#d97706}.log-msg.skip{color:#2563eb}.log-msg.info{color:#64748b}

/* ── FOOTER ── */
.footer{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 14px;background:#fff;border-top:1px solid #e2e8f0;
}
.footer-links{display:flex;gap:10px}
.footer-link{font-size:9px;color:#94a3b8;cursor:pointer;transition:color .15s;font-weight:600}
.footer-link:hover{color:#C89500}
.version{font-size:9px;color:#e2e8f0;font-family:'JetBrains Mono',monospace}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">⬡</div>
  <div class="header-info">
    <h1>RealMoney Bot</h1>
    <p>By KulleSoft</p>
  </div>
  <div class="header-right">
    <div class="status-pill">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Aguardando</span>
    </div>
    <div class="timer" id="timerDisplay">00:00:00</div>
  </div>
</div>

<!-- STATS -->
<div class="stats">
  <div class="stat"><div class="stat-val" style="color:#C89500" id="sTotal">40</div><div class="stat-label">Total</div></div>
  <div class="stat"><div class="stat-val" style="color:#10b981" id="sOk">0</div><div class="stat-label">OK</div></div>
  <div class="stat"><div class="stat-val" style="color:#f59e0b" id="sPend">40</div><div class="stat-label">Pendente</div></div>
  <div class="stat"><div class="stat-val" style="color:#ef4444" id="sErr">0</div><div class="stat-label">Erro</div></div>
</div>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<!-- ACTION BUTTONS — Dashboard e Config bem visíveis -->
<div class="action-bar">
  <button class="btn-action btn-action-dash" id="btnDash">
    <span>⛶</span> Dashboard Completo
  </button>
  <button class="btn-action btn-action-cfg" id="btnOpts">
    <span>⚙</span> Configurações
  </button>
  <button class="btn-action btn-action-captcha" id="btnCaptcha">
    <span>🧩</span> Painel Captcha
  </button>
</div>

<!-- BOTÃO EXTENSÃO OBRIGATÓRIA -->
<div style="padding:8px 14px;background:#fff;border-bottom:1px solid #e2e8f0">
  <button id="btnInstallExt" style="
    width:100%;height:34px;border-radius:9px;border:1px solid #fca5a5;
    background:#fef2f2;color:#dc2626;font-family:'Inter',sans-serif;
    font-size:11px;font-weight:700;cursor:pointer;display:flex;
    align-items:center;justify-content:center;gap:7px;transition:all .15s;
    letter-spacing:.1px;
  ">
    <span style="font-size:14px">🔌</span> Instalar extensão obrigatória
  </button>
</div>

<!-- EMAIL -->
<div class="email-section">
  <div class="email-label">E-mail da conta</div>
  <input type="email" class="email-input" id="emailInput" placeholder="seu@email.com">
</div>

<!-- MODO DE NAVEGAÇÃO -->
<div class="nav-mode-bar">
  <span class="nav-mode-label">Abrir faucets:</span>
  <div class="toggle-group">
    <button class="toggle-opt active" id="modeTab" data-mode="tab">Nova guia</button>
    <button class="toggle-opt"        id="modeSame" data-mode="same">Mesma guia</button>
  </div>
</div>

<!-- CONTROLES -->
<div class="controls">
  <button class="btn btn-start" id="btnStart">▶ Iniciar Bot</button>
  <button class="btn btn-stop"  id="btnStop" disabled>■ Parar</button>
</div>

<!-- TABELA -->
<div class="table-wrap">
  <table>
    <thead>
      <tr><th>Moeda</th><th>Site</th><th>Coleta</th><th>Status</th></tr>
    </thead>
    <tbody id="faucetTable"></tbody>
  </table>
</div>

<!-- LOG -->
<div class="log-header">Log de atividade</div>
<div class="log-box" id="logBox"></div>

<!-- FOOTER -->
<div class="footer">
  <div class="footer-links">
    <span class="footer-link" id="linkCfc">claimfreecoins.io</span>
    <span class="footer-link" id="linkBee">beefaucet.org</span>
  </div>
  <span class="version">v1.0.0 · KulleSoft</span>
</div>

<script src="popup.js"></script>
</body>
</html>
